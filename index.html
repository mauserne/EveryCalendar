<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모임 일정 조율</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #21253a;
            --surface3: #2a2f47;
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.14);
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --green: #34d399;
            --green-bg: rgba(52, 211, 153, 0.12);
            --green-border: rgba(52, 211, 153, 0.3);
            --red: #f87171;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --holiday: #fb7185;
            --sat: #60a5fa;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg);
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Top gradient accent */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(108, 99, 255, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(108, 99, 255, 0.15);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: var(--accent2);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #f1f5f9 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text3);
            font-size: 15px;
        }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 820px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .side-col {
                order: -1;
            }
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            backdrop-filter: blur(12px);
        }

        /* Login */
        .login-wrap {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-field {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 11px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field::placeholder {
            color: var(--text3);
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            padding: 11px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-secondary {
            background: var(--surface3);
            color: var(--text2);
            border: 1px solid var(--border2);
        }

        .btn-secondary:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover {
            background: #7c73ff;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .status-msg {
            font-size: 12px;
            color: var(--text3);
            min-height: 18px;
            padding-left: 2px;
        }

        .status-msg.success {
            color: var(--green);
        }

        .status-msg.error {
            color: var(--red);
        }

        /* Calendar nav */
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 24px 0 20px;
        }

        .cal-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .nav-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text2);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--surface3);
            color: var(--text);
            border-color: var(--accent);
        }

        /* Calendar grid */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text3);
            padding-bottom: 8px;
        }

        .day-header.sun {
            color: var(--holiday);
        }

        .day-header.sat {
            color: var(--sat);
        }

        .day {
            aspect-ratio: 1 / 1.2;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
            gap: 2px;
        }

        .day:hover {
            border-color: var(--border2);
            background: var(--surface2);
            transform: translateY(-1px);
        }

        .day-num {
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            color: var(--text2);
        }

        .day-num.holiday {
            color: var(--holiday);
        }

        .day-num.sat {
            color: var(--sat);
        }

        .day-count {
            font-size: 9px;
            color: var(--text3);
            font-weight: 500;
            line-height: 1;
        }

        /* Heat bar at bottom of each day */
        .day-heat {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 0 0 10px 10px;
            background: transparent;
            transition: background 0.3s;
        }

        /* Active (my selection) */
        .day.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 4px 16px var(--accent-glow);
            transform: translateY(-1px) scale(1.04);
        }

        .day.active .day-num {
            color: white;
        }

        .day.active .day-count {
            color: rgba(255, 255, 255, 0.7);
        }

        .day.active .day-heat {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Green highlight (recommended dates) */
        .day.highlight-green {
            background: var(--green-bg);
            border-color: var(--green-border);
        }

        .day.highlight-green .day-num {
            color: var(--green);
        }

        .day.highlight-green.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .day.highlight-green.active .day-num {
            color: white;
        }

        /* Today */
        .day.today .day-num::after {
            content: '';
            display: block;
            width: 3px;
            height: 3px;
            background: var(--accent2);
            border-radius: 50%;
            margin: 2px auto 0;
        }

        /* Heat levels (non-active) */
        .heat-1 .day-heat {
            background: rgba(108, 99, 255, 0.2);
        }

        .heat-2 .day-heat {
            background: rgba(108, 99, 255, 0.4);
        }

        .heat-3 .day-heat {
            background: rgba(108, 99, 255, 0.6);
        }

        .heat-4 .day-heat {
            background: rgba(108, 99, 255, 0.8);
        }

        /* Save button */
        .save-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: all 0.2s;
            box-shadow: 0 4px 24px var(--accent-glow);
        }

        .save-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px var(--accent-glow);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        /* Side column */
        .side-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 14px;
        }

        /* Hover panel */
        .hover-date-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .hover-date-sub {
            font-size: 12px;
            color: var(--text3);
            margin-bottom: 14px;
        }

        .user-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }

        .user-list::-webkit-scrollbar {
            width: 4px;
        }

        .user-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .user-list::-webkit-scrollbar-thumb {
            background: var(--surface3);
            border-radius: 4px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface2);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text2);
            border: 1px solid var(--border);
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .empty-msg {
            text-align: center;
            color: var(--text3);
            font-size: 13px;
            padding: 16px 0;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 0;
        }

        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
        }

        /* Best dates */
        .best-date-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            transition: border-color 0.2s;
        }

        .best-date-item:hover {
            border-color: var(--accent);
        }

        .best-date-text {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
        }

        .best-date-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 100px;
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent2);
            border: 1px solid rgba(108, 99, 255, 0.25);
        }

        .best-date-badge.top {
            background: rgba(52, 211, 153, 0.15);
            color: var(--green);
            border-color: rgba(52, 211, 153, 0.3);
        }

        /* My selections list */
        .my-dates-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .my-date-chip {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            background: rgba(108, 99, 255, 0.12);
            border: 1px solid rgba(108, 99, 255, 0.2);
            color: var(--accent2);
            border-radius: 100px;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text3);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .ld-selected {
            background: var(--accent);
        }

        .ld-green {
            background: var(--green);
            opacity: 0.7;
        }

        .ld-heat {
            background: linear-gradient(90deg, rgba(108, 99, 255, 0.2), rgba(108, 99, 255, 0.8));
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="app">

        <!-- Header -->
        <div class="header">
            <div class="header-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                Schedule Planner
            </div>
            <h1>모임 일정 조율</h1>
            <p>가능한 날짜를 선택하고 저장하세요</p>
        </div>

        <div class="layout">
            <!-- Main calendar -->
            <div class="card">

                <!-- Login -->
                <div class="login-wrap">
                    <input type="text" class="input-field" id="userName" placeholder="이름을 입력하세요 (예: 홍길동)"
                        autocomplete="off">
                    <button class="btn btn-secondary" onclick="loadUserData()">로그인</button>
                </div>
                <div id="statusMsg" class="status-msg"></div>

                <!-- Calendar header -->
                <div class="cal-header">
                    <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
                    <div class="cal-title" id="monthDisplay"></div>
                    <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
                </div>

                <!-- Grid -->
                <div id="calendar" class="cal-grid"></div>

                <!-- Legend -->
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-dot ld-selected"></div>내가 선택
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot ld-green"></div>추천 날짜
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot ld-heat"></div>참여 인원 많을수록 진함
                    </div>
                </div>

                <button class="save-btn" onclick="saveData()">✓ &nbsp;저장하기</button>
            </div>

            <!-- Side column -->
            <div class="side-col">

                <!-- Stats -->
                <div class="card">
                    <div class="card-label">현황</div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-val" id="statMyCount">0</div>
                            <div class="stat-label">내가 선택한 날</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-val" id="statTotalUsers">0</div>
                            <div class="stat-label">최대 참여 인원</div>
                        </div>
                    </div>
                </div>

                <!-- Best dates -->
                <div class="card">
                    <div class="card-label">🏆 인원 많은 날 TOP 3</div>
                    <div id="bestDatesList">
                        <div class="empty-msg">데이터를 불러오세요</div>
                    </div>
                </div>

                <!-- Hover panel -->
                <div class="card">
                    <div class="card-label">날짜별 참여자</div>
                    <div id="hoverDateTitle" class="hover-date-title">—</div>
                    <div id="hoverDateSub" class="hover-date-sub">날짜에 마우스를 올려보세요</div>
                    <ul id="userList" class="user-list">
                        <li class="empty-msg">—</li>
                    </ul>
                </div>

                <!-- My selections -->
                <div class="card">
                    <div class="card-label">내 선택 날짜</div>
                    <div id="myDatesList">
                        <div class="empty-msg">선택된 날짜가 없습니다</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const HOLIDAYS_2026 = new Set([
            '2026-1-1', '2026-2-14', '2026-2-16', '2026-2-17', '2026-2-18',
            '2026-3-1', '2026-3-2', '2026-5-1', '2026-5-5', '2026-5-24', '2026-5-25',
            '2026-6-3', '2026-6-6', '2026-7-17', '2026-8-15', '2026-8-17',
            '2026-9-24', '2026-9-25', '2026-9-26', '2026-10-3', '2026-10-5',
            '2026-10-9', '2026-12-25',
        ]);

        const GREEN_DATES = new Set([
            '2026-7-25', '2026-7-26', '2026-7-31',
            '2026-8-1', '2026-8-2',
            '2026-9-5', '2026-9-6',
            '2026-10-2', '2026-10-3', '2026-10-4',
        ]);

        let usersByDate = {};
        let mySelectedDates = new Set();
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentUserName = "";
        let isLoaded = false;

        const today = new Date();

        function renderCalendar() {
            const calEl = document.getElementById('calendar');
            const monthDisplay = document.getElementById('monthDisplay');
            calEl.innerHTML = '';
            monthDisplay.innerText = `${currentYear}년 ${currentMonth + 1}월`;

            ['일', '월', '화', '수', '목', '금', '토'].forEach((d, i) => {
                const cls = i === 0 ? 'sun' : i === 6 ? 'sat' : '';
                calEl.innerHTML += `<div class="day-header ${cls}">${d}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const maxUsers = Math.max(1, ...Object.values(usersByDate).map(u => u.length));

            for (let i = 0; i < firstDay; i++) calEl.innerHTML += '<div></div>';

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;
                const users = usersByDate[dateStr] || [];
                const isActive = mySelectedDates.has(dateStr);
                const isHoliday = HOLIDAYS_2026.has(dateStr);
                const isGreen = GREEN_DATES.has(dateStr);
                const isToday = (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());

                const dow = new Date(currentYear, currentMonth, d).getDay();
                const isSun = dow === 0;
                const isSat = dow === 6;

                let numCls = '';
                if (isHoliday || isSun) numCls = 'holiday';
                else if (isSat) numCls = 'sat';

                const ratio = users.length / maxUsers;
                let heatCls = '';
                if (!isActive && users.length > 0) {
                    if (ratio < 0.25) heatCls = ' heat-1';
                    else if (ratio < 0.5) heatCls = ' heat-2';
                    else if (ratio < 0.75) heatCls = ' heat-3';
                    else heatCls = ' heat-4';
                }

                let dayCls = 'day';
                if (isActive) dayCls += ' active';
                if (isGreen && !isActive) dayCls += ' highlight-green';
                if (isToday) dayCls += ' today';
                dayCls += heatCls;

                const dayEl = document.createElement('div');
                dayEl.className = dayCls;
                dayEl.innerHTML = `
      <span class="day-num ${numCls}">${d}</span>
      <span class="day-count">${users.length > 0 ? users.length + '명' : ''}</span>
      <div class="day-heat"></div>
    `;
                dayEl.onclick = () => toggleDate(dateStr, dayEl);
                dayEl.onmouseenter = () => updateSidePanel(dateStr);
                dayEl.onmouseleave = () => clearSidePanel();
                calEl.appendChild(dayEl);
            }

            updateStats();
            updateBestDates();
            updateMyDates();
        }

        function toggleDate(dateStr, el) {
            if (!isLoaded) {
                setStatus('이름을 입력하고 로그인 버튼을 먼저 눌러주세요!', 'error');
                return;
            }
            if (!usersByDate[dateStr]) usersByDate[dateStr] = [];
            const isGreen = GREEN_DATES.has(dateStr);

            if (mySelectedDates.has(dateStr)) {
                mySelectedDates.delete(dateStr);
                usersByDate[dateStr] = usersByDate[dateStr].filter(u => u !== currentUserName);
                el.classList.remove('active');
                if (isGreen) el.classList.add('highlight-green');
            } else {
                mySelectedDates.add(dateStr);
                if (!usersByDate[dateStr].includes(currentUserName)) usersByDate[dateStr].push(currentUserName);
                el.classList.remove('highlight-green');
                el.classList.add('active');
            }

            el.querySelector('.day-count').innerText = usersByDate[dateStr].length > 0 ? usersByDate[dateStr].length + '명' : '';
            updateSidePanel(dateStr);
            updateStats();
            updateBestDates();
            updateMyDates();
        }

        function updateSidePanel(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const date = new Date(+y, +m - 1, +d);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('hoverDateTitle').innerText = `${m}월 ${d}일 (${days[date.getDay()]})`;
            document.getElementById('hoverDateSub').innerText = `${y}년`;

            const users = usersByDate[dateStr] || [];
            const ul = document.getElementById('userList');
            if (users.length === 0) {
                ul.innerHTML = '<li class="empty-msg">선택한 인원이 없습니다</li>';
            } else {
                ul.innerHTML = users.map(u => `
      <li class="user-item">
        <div class="user-avatar">${u.charAt(0)}</div>
        <span>${u}</span>
      </li>`).join('');
            }
        }

        function clearSidePanel() {
            document.getElementById('hoverDateTitle').innerText = '—';
            document.getElementById('hoverDateSub').innerText = '날짜에 마우스를 올려보세요';
            document.getElementById('userList').innerHTML = '<li class="empty-msg">—</li>';
        }

        function updateStats() {
            document.getElementById('statMyCount').innerText = mySelectedDates.size;
            const max = Math.max(0, ...Object.values(usersByDate).map(u => u.length));
            document.getElementById('statTotalUsers').innerText = max;
        }

        function updateBestDates() {
            const sorted = Object.entries(usersByDate)
                .filter(([, u]) => u.length > 0)
                .sort((a, b) => b[1].length - a[1].length)
                .slice(0, 3);

            const el = document.getElementById('bestDatesList');
            if (sorted.length === 0) {
                el.innerHTML = '<div class="empty-msg">아직 데이터가 없습니다</div>';
                return;
            }

            el.innerHTML = sorted.map(([dateStr, users], i) => {
                const [y, m, d] = dateStr.split('-');
                const date = new Date(+y, +m - 1, +d);
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                return `<div class="best-date-item">
      <span class="best-date-text">${m}월 ${d}일 (${days[date.getDay()]})</span>
      <span class="best-date-badge ${i === 0 ? 'top' : ''}">${users.length}명</span>
    </div>`;
            }).join('');
        }

        function updateMyDates() {
            const el = document.getElementById('myDatesList');
            if (mySelectedDates.size === 0) {
                el.innerHTML = '<div class="empty-msg">선택된 날짜가 없습니다</div>';
                return;
            }
            const sorted = [...mySelectedDates].sort();
            el.innerHTML = `<div class="my-dates-list">${sorted.map(ds => {
                const [y, m, d] = ds.split('-');
                return `<span class="my-date-chip">${m}/${d}</span>`;
            }).join('')}</div>`;
        }

        async function loadAllSchedules() {
            try {
                const res = await fetch('/api/get-schedule');
                if (!res.ok) throw new Error();
                const data = await res.json();
                usersByDate = data.usersByDate || {};
                renderCalendar();
            } catch {
                renderCalendar();
            }
        }

        async function loadUserData() {
            const name = document.getElementById('userName').value.trim();
            if (!name) { setStatus('이름을 먼저 입력해주세요.', 'error'); return; }

            setStatus('로그인 중...', '');
            try {
                const res = await fetch(`/api/get-schedule?name=${encodeURIComponent(name)}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                usersByDate = data.usersByDate || {};
                mySelectedDates = new Set(data.userDates || []);
                currentUserName = name; isLoaded = true;
                renderCalendar();
                setStatus(`✓ ${name}님 로그인 완료`, 'success');
            } catch {
                currentUserName = name; isLoaded = true;
                renderCalendar();
                setStatus(`✓ ${name}님 로그인 완료`, 'success');
            }
        }

        async function saveData() {
            if (!isLoaded) { setStatus('로그인을 먼저 해주세요.', 'error'); return; }
            const name = document.getElementById('userName').value.trim();
            if (name !== currentUserName) { setStatus('로그인한 이름과 다릅니다. 다시 로그인해주세요.', 'error'); return; }

            setStatus('저장 중...', '');
            try {
                const res = await fetch('/api/save-schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: currentUserName, dates: Array.from(mySelectedDates) })
                });
                if (!res.ok) throw new Error();
                await loadUserData();
                setStatus('✓ 저장 완료!', 'success');
            } catch {
                setStatus('✕ 저장 중 오류가 발생했습니다.', 'error');
            }
        }

        function changeMonth(diff) {
            currentMonth += diff;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function setStatus(msg, type) {
            const el = document.getElementById('statusMsg');
            el.innerText = msg;
            el.className = 'status-msg ' + (type || '');
        }

        document.getElementById('userName').addEventListener('keydown', e => {
            if (e.key === 'Enter') loadUserData();
        });

        loadAllSchedules();
    </script>
</body>

</html>

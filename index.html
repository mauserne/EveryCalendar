<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>모임 일정 조율 (수정본)</title>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        .side-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 250px;
            min-height: 380px;
        }

        .side-container h3 {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .hover-date {
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 10px;
            font-size: 0.95rem;
            min-height: 20px;
        }

        .user-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .user-list li {
            padding: 8px 10px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
            color: #555;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .day-header {
            font-weight: bold;
            font-size: 14px;
            padding-bottom: 10px;
        }

        .sun {
            color: #ff4d4d;
        }

        .sat {
            color: #4a90e2;
        }

        .day {
            aspect-ratio: 1 / 1.1;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .day:hover {
            border-color: #4a90e2;
            background-color: #f0f7ff;
        }

        .day.active {
            background-color: #4a90e2;
            color: white;
            transform: scale(1.05);
        }

        .count {
            font-size: 11px;
            margin-top: 4px;
            color: #888;
        }

        .active .count {
            color: #e0e0e0;
        }

        .login-section {
            margin-bottom: 20px;
        }

        #userName {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-load,
        .btn-save {
            padding: 8px 15px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-load {
            background-color: #6c757d;
        }

        .btn-save {
            margin-top: 20px;
            background-color: #36a1ff;
            width: 100%;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="container">
            <div class="login-section">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="userName" placeholder="이름을 입력하세요 (예: 홍길동)">
                    <button class="btn-load" onclick="loadUserData()">로그인/조회</button>
                </div>
            </div>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">&lt;</button>
                <h3 id="monthDisplay"></h3>
                <button onclick="changeMonth(1)">&gt;</button>
            </div>

            <div id="calendar" class="calendar-grid"></div>
            <button class="btn-save" onclick="saveData()">저장하기</button>
        </div>

        <div class="side-container">
            <h3>선택 인원 확인</h3>
            <div id="hoverDateDisplay" class="hover-date">날짜에 마우스를 올려보세요</div>
            <ul id="userList" class="user-list">
                <li style="color: #aaa; text-align: center; padding-top: 20px;">목록이 이곳에 표시됩니다.</li>
            </ul>
        </div>
    </div>

    <script>
        // 1. [데이터 초기화] 테스트를 위해 초기 인원을 몇 명 넣어두었습니다.
        let usersByDate = {
            "2026-4-10": ["김철수", "이영희"],
            "2026-4-15": ["테스터"],
            "2026-4-25": ["박지민", "최동훈", "이영희"]
        };

        let mySelectedDates = new Set(); // 내가 선택한 날짜들
        let currentYear = 2026;
        let currentMonth = 3; // 4월
        let currentUserName = "";

        // 2. [캘린더 렌더링]
        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            const monthDisplay = document.getElementById('monthDisplay');
            calendarEl.innerHTML = '';
            monthDisplay.innerText = `${currentYear}. ${String(currentMonth + 1).padStart(2, '0')}`;

            // 요일 헤더
            ['일', '월', '화', '수', '목', '금', '토'].forEach((day, i) => {
                calendarEl.innerHTML += `<div class="day-header ${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${day}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) calendarEl.innerHTML += `<div></div>`;

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;
                const users = usersByDate[dateStr] || [];
                const isActive = mySelectedDates.has(dateStr) ? 'active' : '';

                const dayEl = document.createElement('div');
                dayEl.className = `day ${isActive}`;
                dayEl.innerHTML = `<span>${d}</span><span class="count">${users.length}명</span>`;

                // 클릭 이벤트
                dayEl.onclick = () => toggleDate(dateStr, dayEl);
                // 호버 이벤트 (리스트 표시)
                dayEl.onmouseenter = () => updateSidePanel(dateStr);
                dayEl.onmouseleave = () => clearSidePanel();

                calendarEl.appendChild(dayEl);
            }
        }

        // 3. [날짜 클릭 시 로직]
        function toggleDate(dateStr, el) {
            if (!currentUserName) {
                alert("이름을 입력하고 '로그인/조회' 버튼을 먼저 눌러주세요!");
                return;
            }

            if (!usersByDate[dateStr]) usersByDate[dateStr] = [];

            if (mySelectedDates.has(dateStr)) {
                // 해제
                mySelectedDates.delete(dateStr);
                usersByDate[dateStr] = usersByDate[dateStr].filter(u => u !== currentUserName);
                el.classList.remove('active');
            } else {
                // 선택
                mySelectedDates.add(dateStr);
                if (!usersByDate[dateStr].includes(currentUserName)) {
                    usersByDate[dateStr].push(currentUserName);
                }
                el.classList.add('active');
            }

            // 인원수 즉시 업데이트
            el.querySelector('.count').innerText = `${usersByDate[dateStr].length}명`;
            updateSidePanel(dateStr); // 사이드바도 즉시 갱신
        }

        // 4. [사이드 패널 업데이트]
        function updateSidePanel(dateStr) {
            const dateDisplay = document.getElementById('hoverDateDisplay');
            const userListEl = document.getElementById('userList');
            const [y, m, d] = dateStr.split('-');

            dateDisplay.innerText = `${y}년 ${m}월 ${d}일`;
            userListEl.innerHTML = '';

            const users = usersByDate[dateStr] || [];
            if (users.length === 0) {
                userListEl.innerHTML = '<li style="color: #aaa;">선택한 인원이 없습니다.</li>';
            } else {
                users.forEach(user => {
                    userListEl.innerHTML += `<li>👨‍💻 ${user}</li>`;
                });
            }
        }

        function clearSidePanel() {
            document.getElementById('hoverDateDisplay').innerText = '날짜에 마우스를 올려보세요';
            document.getElementById('userList').innerHTML = '<li style="color: #aaa; text-align: center; padding-top: 20px;">목록이 이곳에 표시됩니다.</li>';
        }

        async function loadUserData() {
            const name = document.getElementById('userName').value.trim();
            if (!name) return alert("이름을 먼저 입력해주세요.");

            try {
                const response = await fetch(`/api/get-schedule?name=${name}`);
                if (!response.ok) throw new Error("서버 응답 에러");
                const data = await response.json();

                selectedDates = new Set(data.userDates || []);
                usersByDate = data.usersByDate || {}; // 데이터 업데이트

                currentUserName = name;
                isLoaded = true;

                renderCalendar();
                alert(`${name}님의 기존 일정을 불러왔습니다.`);
            } catch (e) {
                console.error("불러오기 실패:", e);
                alert("데이터를 불러오는 중 오류가 발생했습니다.");
            }
        }

        async function saveData() {
            const name = document.getElementById('userName').value.trim();

            if (!isLoaded || name !== currentUserName) {
                return alert("'불러오기' 버튼을 먼저 눌러 기존 정보를 확인해주세요.");
            }
            if (!name) return alert("이름을 입력해주세요.");

            const payload = {
                user: name,
                dates: Array.from(selectedDates)
            };

            try {
                console.log("서버로 전송:", payload);
                const response = await fetch('/api/save-schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("성공적으로 저장되었습니다! (콘솔을 확인하세요)");
                    await loadUserData();
                } else {
                    alert("저장에 실패했습니다.");
                }
            } catch (e) {
                console.error("저장 실패:", e);
                alert("저장 중 통신 에러가 발생했습니다.");
            }
        }

        function changeMonth(diff) {
            currentMonth += diff;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        // 초기 실행
        renderCalendar();
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>모임 일정 조율</title>
    <style>
        /* 화면 중앙 배치를 위한 전체 배경 래퍼 */
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* 캘린더와 사이드 패널을 양옆으로 배치하는 래퍼 */
        .wrapper {
            display: flex;
            gap: 20px;
            /* 두 컨테이너 사이의 간격 */
            align-items: flex-start;
        }

        /* 기존 캘린더 컨테이너 */
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        /* 새로 추가된 사이드 컨테이너 (참석자 목록) */
        .side-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 250px;
            min-height: 380px;
            /* 캘린더와 비슷한 높이 유지 */
        }

        .side-container h3 {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            color: #333;
        }

        .hover-date {
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 10px;
            font-size: 0.95rem;
            min-height: 20px;
            /* 빈 공간 유지 */
        }

        .user-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .user-list li {
            padding: 8px 10px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
            color: #555;
        }

        /* 기존 캘린더 내부 CSS 유지 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .calendar-header h3 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .calendar-header button {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .calendar-header button:hover {
            background: #f0f0f0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .day-header {
            font-weight: bold;
            font-size: 14px;
            padding-bottom: 10px;
            color: #555;
        }

        .sun {
            color: #ff4d4d !important;
        }

        .sat {
            color: #4a90e2 !important;
        }

        .day {
            aspect-ratio: 1 / 1.1;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .day:hover {
            border-color: #4a90e2;
            /* 호버 시 테두리만 살짝 강조 */
        }

        .day.active {
            background-color: #4a90e2;
            color: white;
            border-color: #4a90e2;
            transform: scale(1.05);
        }

        .count {
            font-size: 11px;
            margin-top: 4px;
            color: #888;
        }

        .active .count {
            color: #e0e0e0;
        }

        .login-section {
            margin-bottom: 20px;
            width: 100%;
        }

        .login-section div {
            display: flex;
            justify-content: center;
        }

        #userName {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-load,
        .btn-save {
            padding: 0 15px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-load {
            background-color: #6c757d;
        }

        .btn-load:hover {
            background-color: #5a6268;
        }

        .btn-save {
            margin: 20px 0;
            padding: 8px 20px;
            background-color: rgb(54, 161, 255);
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-save:hover {
            background-color: #24679b;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="container">
            <div class="login-section">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="userName" placeholder="이름을 입력하세요">
                    <button class="btn-load" onclick="loadUserData()">불러오기</button>
                </div>
            </div>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">&lt;</button>
                <h3 id="monthDisplay"></h3>
                <button onclick="changeMonth(1)">&gt;</button>
            </div>

            <div id="calendar" class="calendar-grid"></div>

            <button class="btn-save" onclick="saveData()">저장하기</button>
        </div>

        <div class="side-container">
            <h3>선택 인원 확인</h3>
            <div id="hoverDateDisplay" class="hover-date">날짜에 마우스를 올려보세요</div>
            <ul id="userList" class="user-list">
                <li style="color: #aaa; text-align: center; padding-top: 20px;">
                    목록이 이곳에 표시됩니다.
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 기존 인원수 데이터 대신, 선택한 사람들의 '이름 배열'을 저장하는 객체로 예시를 작성했습니다.
        let usersByDate = {
        };

        let selectedDates = new Set();
        let currentYear = 2026;
        let currentMonth = 3; // 0부터 시작이므로 3은 4월을 의미

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            const monthDisplay = document.getElementById('monthDisplay');
            calendarEl.innerHTML = '';

            monthDisplay.innerText = `${currentYear}. ${String(currentMonth + 1).padStart(2, '0')}`;

            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            weekDays.forEach((day, index) => {
                let colorClass = index === 0 ? 'sun' : (index === 6 ? 'sat' : '');
                calendarEl.innerHTML += `<div class="day-header ${colorClass}">${day}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                calendarEl.innerHTML += `<div></div>`;
            }

            for (let d = 1; d <= lastDate; d++) {
                // 날짜 포맷 (예: 2026-4-5) - 앞의 mock 데이터 키 형식과 일치시킵니다.
                const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;

                // 해당 날짜를 선택한 사람들의 배열을 가져오고, 없으면 빈 배열
                const users = usersByDate[dateStr] || [];
                const count = users.length;
                const isActive = selectedDates.has(dateStr) ? 'active' : '';

                const dayEl = document.createElement('div');
                dayEl.className = `day ${isActive}`;
                dayEl.innerHTML = `<span>${d}</span><span class="count">${count}명</span>`;

                // 1. 클릭 이벤트 (선택/해제)
                dayEl.onclick = () => toggleDate(dateStr, dayEl);

                // 2. 마우스 호버 이벤트 (사이드 패널 업데이트)
                dayEl.onmouseenter = () => showHoverInfo(dateStr, users);
                dayEl.onmouseleave = () => clearHoverInfo();

                calendarEl.appendChild(dayEl);
            }
        }

        // 호버 시 사이드 패널에 정보 표시
        function showHoverInfo(dateStr, users) {
            const dateDisplay = document.getElementById('hoverDateDisplay');
            const userList = document.getElementById('userList');

            // 날짜 표시 (예: 2026년 4월 5일)
            const [y, m, d] = dateStr.split('-');
            dateDisplay.innerText = `${y}년 ${m}월 ${d}일`;

            userList.innerHTML = ''; // 리스트 초기화

            if (users.length === 0) {
                userList.innerHTML = '<li style="color: #aaa;">선택한 인원이 없습니다.</li>';
            } else {
                users.forEach(user => {
                    userList.innerHTML += `<li>👨‍💻 ${user}</li>`;
                });
            }
        }

        // 호버 해제 시 사이드 패널 초기화 (원하지 않으면 이 함수를 비워두셔도 됩니다)
        function clearHoverInfo() {
            const dateDisplay = document.getElementById('hoverDateDisplay');
            const userList = document.getElementById('userList');

            dateDisplay.innerText = '날짜에 마우스를 올려보세요';
            userList.innerHTML = '<li style="color: #aaa; text-align: center; padding-top: 20px;">목록이 이곳에 표시됩니다.</li>';
        }

        function toggleDate(dateStr, el) {
            if (selectedDates.has(dateStr)) {
                selectedDates.delete(dateStr);
                el.classList.remove('active');
            } else {
                selectedDates.add(dateStr);
                el.classList.add('active');
            }
        }

        let isLoaded = false;
        let currentUserName = "";

        document.getElementById('userName').addEventListener('input', function () {
            isLoaded = false;
            selectedDates.clear();
            renderCalendar();
        });

        async function loadUserData() {
            const name = document.getElementById('userName').value.trim();
            if (!name) return alert("이름을 먼저 입력해주세요.");

            try {
                selectedDates = new Set(data.userDates || []);
                usersByDate = data.usersByDate || {};

                currentUserName = name;
                isLoaded = true;

                renderCalendar(); // 데이터를 받았으니 달력을 다시 그립니다.
                alert(`${name}님의 데이터를 불러왔습니다. (테스트 모드)`);

            } catch (e) {
                console.error("불러오기 실패:", e);
                alert("데이터를 불러오는 중 오류가 발생했습니다.");
            }
        }

        async function saveData() {
            const name = document.getElementById('userName').value.trim();

            if (!isLoaded || name !== currentUserName) {
                return alert("'불러오기' 버튼을 먼저 눌러 기존 정보를 확인해주세요.");
            }
            if (!name) return alert("이름을 입력해주세요.");

            const payload = {
                user: name,
                dates: Array.from(selectedDates)
            };

            try {
                console.log("서버로 전송:", payload);
                const response = await fetch('/api/save-schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("성공적으로 저장되었습니다! (콘솔을 확인하세요)");
                    await loadUserData();
                } else {
                    alert("저장에 실패했습니다.");
                }
            } catch (e) {
                console.error("저장 실패:", e);
                alert("저장 중 통신 에러가 발생했습니다.");
            }
        }

        function changeMonth(diff) {
            currentMonth += diff;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>

</html>

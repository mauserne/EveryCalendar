<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>모임 일정 조율</title>
    <style>
        /* 전체 컨테이너 크기 조정 */
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 400px;
            /* 달력 폭에 맞춰 조금 넓혔습니다 */
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            /* 양 끝과 중앙으로 간격 분산 */
            align-items: center;
            /* 세로 중앙 정렬 */
            margin-bottom: 20px;
            width: 100%;
            /* 컨테이너 너비에 맞춤 */
        }

        .calendar-header h3 {
            margin: 0;
            /* 제목의 기본 상하 여백 제거 */
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .calendar-header button {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .calendar-header button:hover {
            background: #f0f0f0;
        }

        /* 7열 격자 핵심 설정 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            /* 7개의 열을 동일한 비율로 설정 */
            gap: 8px;
            text-align: center;
        }

        /* 요일 헤더 기본 스타일 */
        .day-header {
            font-weight: bold;
            font-size: 14px;
            padding-bottom: 10px;
            color: #555;
            /* 평일: 진한 회색 */
        }

        /* 일요일: 빨간색 */
        .sun {
            color: #ff4d4d !important;
        }

        /* 토요일: 파란색 */
        .sat {
            color: #4a90e2 !important;
        }

        /* 개별 날짜 칸 */
        .day {
            aspect-ratio: 1 / 1.1;
            /* 약간 세로로 긴 사각형 */
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        /* 날짜 클릭 시 효과 */
        .day.active {
            background-color: #4a90e2;
            color: white;
            border-color: #4a90e2;
            transform: scale(1.05);
            /* 선택 시 살짝 커지는 효과 */
        }

        .count {
            font-size: 11px;
            margin-top: 4px;
            color: #888;
        }

        .active .count {
            color: #e0e0e0;
        }

        .login-section {
            margin-bottom: 20px;
            width: 100%;
        }

        .login-section div {
            display: flex;
            justify-content: center;
        }

        #userName {
            flex: 1;
            /* 입력창이 가능한 넓게 */
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-load {
            padding: 0 15px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-load:hover {
            background-color: #5a6268;
        }

        .btn-save {
            margin: 20px 0;
            padding: 5px 20px;
            background-color: rgb(54, 161, 255);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-save:hover {
            background-color: #24679b;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="login-section">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="userName" placeholder="이름을 입력하세요">
                <button class="btn-load" onclick="loadUserData()">불러오기</button>
            </div>
        </div>

        <div class="calendar-header">
            <button onclick="changeMonth(-1)">&lt;</button>
            <h3 id="monthDisplay"></h3> <!-- 년.월 표시용 헤드 -->
            <button onclick="changeMonth(1)">&gt;</button>
        </div>

        <div id="calendar" class="calendar-grid">
        </div>

        <button class="btn-save" onclick="saveData()">저장하기</button>
    </div>

    <script>
        let currentData = { /* 날짜별 인원수 데이터 예시: "2026-04-05": 3 */ };
        let selectedDates = new Set();
        let currentYear = 2026;
        let currentMonth = 4; // 0부터 시작 (4월)

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            const monthDisplay = document.getElementById('monthDisplay'); // 표시 엘리먼트 가져오기
            calendarEl.innerHTML = '';

            // 현재 연도와 월(0~11이므로 +1)을 화면에 반영
            monthDisplay.innerText = `${currentYear}. ${String(currentMonth + 1).padStart(2, '0')}`;

            // --- 이후 요일 헤더 및 날짜 생성 로직 ---
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
            weekDays.forEach((day, index) => {
                let colorClass = index === 0 ? 'sun' : (index === 6 ? 'sat' : '');
                calendarEl.innerHTML += `<div class="day-header ${colorClass}">${day}</div>`;
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

            // 2. 시작 요일 전까지 빈 칸 생성
            for (let i = 0; i < firstDay; i++) {
                calendarEl.innerHTML += `<div></div>`;
            }

            // 3. 날짜 생성
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${currentYear}-${currentMonth + 1}-${d}`;
                const count = currentData[dateStr] || 0;
                const isActive = selectedDates.has(dateStr) ? 'active' : '';

                const dayEl = document.createElement('div');
                dayEl.className = `day ${isActive}`;
                dayEl.innerHTML = `<span>${d}</span><span class="count">${count}명</span>`;
                dayEl.onclick = () => toggleDate(dateStr, dayEl);
                calendarEl.appendChild(dayEl);
            }
        }

        function toggleDate(dateStr, el) {
            if (selectedDates.has(dateStr)) {
                selectedDates.delete(dateStr);
                el.classList.remove('active');
            } else {
                selectedDates.add(dateStr);
                el.classList.add('active');
            }
        }

        let isLoaded = false; // 불러오기 완료 여부 플래그
        let currentUserName = ""; // 현재 불러온 사용자 이름 저장

        // 이름 입력창에 변화가 생기면 다시 불러오기를 해야 함
        document.getElementById('userName').addEventListener('input', function () {
            isLoaded = false;
            selectedDates.clear(); // 선택 초기화 (선택사항)
            renderCalendar();
        });

        // 1. 서버에서 데이터 불러오기
        async function loadUserData() {
            const name = document.getElementById('userName').value.trim();
            if (!name) return alert("이름을 먼저 입력해주세요.");

            try {
                // 실제 서버 API 호출 예시 (GET 방식)
                // const response = await fetch(`/api/get-schedule?name=${name}`);
                // const data = await response.json(); 

                // --- [테스트용 가상 로직 시작] ---
                // 서버에서 받아온 데이터가 ['2026-04-10', '2026-04-15'] 라고 가정
                const mockDataFromServer = []; // 실제로는 fetch 결과가 들어감

                selectedDates = new Set(mockDataFromServer);
                currentUserName = name;
                isLoaded = true; // 불러오기 성공 표시

                renderCalendar();
                alert(`${name}님의 기존 일정을 불러왔습니다. 이제 수정 후 저장할 수 있습니다.`);
                // --- [테스트용 가상 로직 끝] ---

            } catch (e) {
                console.error("불러오기 실패:", e);
                alert("데이터를 불러오는 중 오류가 발생했습니다.");
            }
        }

        // 2. 서버로 데이터 저장하기
        async function saveData() {
            const name = document.getElementById('userName').value.trim();

            // [체크 1] 불러오기를 먼저 했는지 확인
            if (!isLoaded || name !== currentUserName) {
                return alert("'불러오기' 버튼을 먼저 눌러 기존 정보를 확인해주세요.");
            }

            // [체크 2] 이름 입력 확인
            if (!name) return alert("이름을 입력해주세요.");

            const payload = {
                user: name,
                dates: Array.from(selectedDates)
            };

            try {
                console.log("서버로 전송:", payload);
                /*
                const response = await fetch('/api/save-schedule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(response.ok) alert("성공적으로 저장되었습니다!");
                */
                alert("저장이 완료되었습니다.");
            } catch (e) {
                alert("저장 실패!");
            }
        }

        function changeMonth(diff) {
            currentMonth += diff;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        renderCalendar();
    </script>

</body>

</html>
